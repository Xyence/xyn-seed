services:
  postgres:
    image: postgres:16-alpine
    container_name: xyn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xyn
      POSTGRES_USER: xyn
      POSTGRES_PASSWORD: xyn_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xyn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xyn-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xyn-core
    restart: unless-stopped
    environment:
      XYN_ENV: ${XYN_ENV:-local}
      XYN_BASE_DOMAIN: ${XYN_BASE_DOMAIN:-${DOMAIN:-}}
      XYN_AUTH_MODE: ${XYN_AUTH_MODE:-simple}
      DATABASE_URL: postgresql://xyn:xyn_dev_password@postgres:5432/xyn
      REDIS_URL: redis://redis:6379/0
      ARTIFACT_STORE_PATH: /app/artifacts
      XYNSEED_WORKSPACE: /app/workspace
      XYNSEED_CONTRACTS_ROOT: /xyn-contracts
      XYN_SEED_ENABLE_LEGACY_PRODUCT: "false"
      XYN_ENABLE_BLUEPRINTS_LEGACY: ${XYN_ENABLE_BLUEPRINTS_LEGACY:-false}
      # Canonical xyn-api upstream base URL used by kernel binding fetch and api proxy role.
      XYN_API_BASE_URL: ${XYN_API_BASE_URL:-http://host.docker.internal:8000}
      XYN_KERNEL_WORKSPACE_ID: ${XYN_KERNEL_WORKSPACE_ID:-}
      XYN_INTERNAL_TOKEN: ${XYN_INTERNAL_TOKEN:-${XYENCE_INTERNAL_TOKEN:-}}
      XYN_KERNEL_MANIFEST_ROOTS: ${XYN_KERNEL_MANIFEST_ROOTS:-/home/ubuntu/src}
      XYN_OIDC_ISSUER: ${XYN_OIDC_ISSUER:-}
      XYN_OIDC_CLIENT_ID: ${XYN_OIDC_CLIENT_ID:-}
      XYN_OIDC_REDIRECT_URI: ${XYN_OIDC_REDIRECT_URI:-}
      XYN_AI_PROVIDER: ${XYN_AI_PROVIDER:-}
      XYN_AI_MODEL: ${XYN_AI_MODEL:-gpt-5-mini}
      XYN_OPENAI_API_KEY: ${XYN_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}
      XYN_GEMINI_API_KEY: ${XYN_GEMINI_API_KEY:-${GEMINI_API_KEY:-}}
      XYN_ANTHROPIC_API_KEY: ${XYN_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}
      XYN_SECRET_KEY: ${XYN_SECRET_KEY:-}
      XYN_CREDENTIALS_ENCRYPTION_KEY: ${XYN_CREDENTIALS_ENCRYPTION_KEY:-}
      OPENAI_API_KEY: ${XYN_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}
      GEMINI_API_KEY: ${XYN_GEMINI_API_KEY:-${GEMINI_API_KEY:-}}
      ANTHROPIC_API_KEY: ${XYN_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}
      ENV_ID: local-dev
      LOG_LEVEL: INFO
    ports:
      - "8001:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./workspace:/app/workspace
      - ./core:/app/core
      - /home/ubuntu/src/xyn-api:/home/ubuntu/src/xyn-api:ro
      - /home/ubuntu/src/xyn-ui:/home/ubuntu/src/xyn-ui:ro
      - /home/ubuntu/src/artifacts:/home/ubuntu/src/artifacts:ro
      - /home/ubuntu/src/xyn-contracts:/xyn-contracts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn core.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
