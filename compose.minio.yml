services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: xyn-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${XYN_MINIO_ROOT_USER:-xynminio}
      MINIO_ROOT_PASSWORD: ${XYN_MINIO_ROOT_PASSWORD:-xynminio123}
    ports:
      - "${XYN_MINIO_API_PORT:-9000}:9000"
      - "${XYN_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./.xyn/minio:/data:z
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: xyn-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      XYN_MINIO_ROOT_USER: ${XYN_MINIO_ROOT_USER:-xynminio}
      XYN_MINIO_ROOT_PASSWORD: ${XYN_MINIO_ROOT_PASSWORD:-xynminio123}
      XYN_RUNTIME_ARTIFACT_S3_BUCKET: ${XYN_RUNTIME_ARTIFACT_S3_BUCKET:-xyn-runtime-artifacts}
    entrypoint: >
      /bin/sh -lc '
      set -e;
      mc alias set local http://minio:9000 "$${XYN_MINIO_ROOT_USER}" "$${XYN_MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing local/$${XYN_RUNTIME_ARTIFACT_S3_BUCKET};
      '

  core:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      XYN_RUNTIME_ARTIFACT_PROVIDER: ${XYN_RUNTIME_ARTIFACT_PROVIDER:-s3}
      XYN_RUNTIME_ARTIFACT_S3_ENDPOINT_URL: ${XYN_RUNTIME_ARTIFACT_S3_ENDPOINT_URL:-http://minio:9000}
      XYN_RUNTIME_ARTIFACT_S3_BUCKET: ${XYN_RUNTIME_ARTIFACT_S3_BUCKET:-xyn-runtime-artifacts}
      XYN_RUNTIME_ARTIFACT_S3_REGION: ${XYN_RUNTIME_ARTIFACT_S3_REGION:-us-east-1}
      XYN_RUNTIME_ARTIFACT_S3_PREFIX: ${XYN_RUNTIME_ARTIFACT_S3_PREFIX:-xyn/runtime}
      XYN_RUNTIME_ARTIFACT_S3_ACCESS_KEY_ID: ${XYN_RUNTIME_ARTIFACT_S3_ACCESS_KEY_ID:-${XYN_MINIO_ROOT_USER:-xynminio}}
      XYN_RUNTIME_ARTIFACT_S3_SECRET_ACCESS_KEY: ${XYN_RUNTIME_ARTIFACT_S3_SECRET_ACCESS_KEY:-${XYN_MINIO_ROOT_PASSWORD:-xynminio123}}
      XYN_RUNTIME_ARTIFACT_S3_FORCE_PATH_STYLE: ${XYN_RUNTIME_ARTIFACT_S3_FORCE_PATH_STYLE:-true}
